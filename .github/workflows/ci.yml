name: CI

# microservice-user-collections needs one sibling SNAPSHOT (offline-jwt, public); checkouts use the workspace
# layout (each repo in its own directory) because the saga-confirmation provider test verifies
# microservice-offboarding's committed pact from the sibling checkout. The reactor CI (in the
# aggregator repo) still validates everything together.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: microservice-user-collections
      # consumer of this service's confirmations — checkout only (its pacts/), no build
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-offboarding
          path: microservice-offboarding
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/offline-jwt
          path: offline-jwt
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Install the offline-jwt library
        run: mvn -B -q --no-transfer-progress -f offline-jwt/pom.xml install -DskipTests
      - name: Build and test (including pact provider verification)
        run: mvn -B --no-transfer-progress -f microservice-user-collections/pom.xml clean verify
